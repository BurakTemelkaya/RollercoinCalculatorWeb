<body>

  <!-- Top Banner Ad moved to MainLayout.tsx -->

  <div id="root"></div>


  <!-- Responsive Visibility -->
  <style>
    /* Default: hide side ads on mobile */
    .desktop-side-ad {
      display: none;
    }

    .aads-mobile-only {
      display: none;
    }

    /* Desktop: show side ads at 1025px+ and push content inward */
    @media (min-width: 1025px) {
      .desktop-side-ad {
        display: block;
      }

      #root {
        padding-left: 170px;
        padding-right: 170px;
      }
    }

    /* Mobile: show bottom ad on small screens */
    @media (max-width: 1024px) {
      .aads-mobile-only {
        display: block;
      }
    }

    /* Hide mobile ads when blocked */
    body.ads-blocked .aads-mobile-only {
      display: none !important;
    }

    /* Dashboard / Admin Panel: Hide all global ads */
    body.hide-global-ads .desktop-side-ad,
    body.hide-global-ads .aads-mobile-only {
      display: none !important;
    }

    @media (min-width: 1025px) {
      body.hide-global-ads #root {
        padding-left: 0 !important;
        padding-right: 0 !important;
      }
    }
  </style>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Service Worker: silent registration, no user prompts
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(function (reg) {
        // Optional: trigger update check on navigation
        reg.update();
      });

      // Reload the page when the service worker updates and takes control
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (!refreshing) {
          window.location.reload();
          refreshing = true;
        }
      });
    }

    // Ad-blocker detection
    // Sets 'ads-blocked' class on body — React components handle the UI.
    (function () {
      var testUrl = 'https://static.rollercoin.com/static/img/market/miners/antminer_s9.gif?v=1';
      setTimeout(function () {
        fetch(testUrl, { method: 'HEAD', mode: 'no-cors' })
          .then(function () {
            // Resources accessible — no ad-blocker
          })
          .catch(function () {
            // Fetch blocked — ad-blocker detected
            document.body.classList.add('ads-blocked');
          });
      }, 1000);
    })();
  </script>
