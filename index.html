  <!-- Global Ad Manager -->
  <script>
    window.AdManager = {
        loadAd: function(containerId, aadsId, aadsW, aadsH, adsterraKey, adsterraW, adsterraH) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            const renderAAds = () => {
                container.innerHTML = '<iframe data-aa="' + aadsId + '" src="//ad.a-ads.com/' + aadsId + '/?size=' + aadsW + 'x' + aadsH + '&background_color=1e2433&title_color=fffffe" style="border:0; padding:0; width:' + aadsW + 'px; height:' + aadsH + 'px; overflow:hidden; display:block; margin: 0 auto"></iframe>';
            };
            
            const renderAdsterra = () => {
                const iframe = document.createElement('iframe');
                iframe.style.border = '0';
                iframe.style.padding = '0';
                iframe.style.width = adsterraW + 'px';
                iframe.style.height = adsterraH + 'px';
                iframe.style.overflow = 'hidden';
                iframe.style.display = 'block';
                iframe.style.margin = '0 auto';
                iframe.scrolling = 'no';
                container.innerHTML = '';
                container.appendChild(iframe);
                const doc = iframe.contentWindow.document;
                doc.open();
                doc.write('<!DOCTYPE html><html><head><style>body { margin: 0; padding: 0; background: transparent; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }</style></head><body>' +
                    '<scr' + 'ipt type="text/javascript">' +
                    'atOptions = { "key" : "' + adsterraKey + '", "format" : "iframe", "height" : ' + adsterraH + ', "width" : ' + adsterraW + ', "params" : {} };' +
                    '</scr' + 'ipt>' +
                    '<scr' + 'ipt type="text/javascript" src="https://www.highperformanceformat.com/' + adsterraKey + '/invoke.js"></scr' + 'ipt>' +
                    '</body></html>'
                );
                doc.close();
            };

            const tryAAds = () => {
                let handled = false;
                const timer = setTimeout(() => {
                    if(handled) return;
                    handled = true;
                    renderAdsterra();
                }, 1500);

                fetch('https://ad.a-ads.com/', { mode: 'no-cors' })
                    .then(() => {
                        if(handled) return;
                        handled = true;
                        clearTimeout(timer);
                        renderAAds();
                    })
                    .catch(() => {
                        if(handled) return;
                        handled = true;
                        clearTimeout(timer);
                        renderAdsterra();
                    });
            };

            const useAAds = Math.random() < 0.5;
            if (useAAds) {
                tryAAds();
            } else {
                renderAdsterra();
            }
        }
    };
  </script>

  <script>
    // Service Worker: forces fresh index.html on navigation, auto-reloads on new deploy
    if ('serviceWorker' in navigator && navigator.userAgent.indexOf('ReactSnap') === -1) {
      navigator.serviceWorker.register('/sw.js').then(function (reg) {
        reg.addEventListener('updatefound', function () {
          var newWorker = reg.installing;
          newWorker.addEventListener('statechange', function () {
            // Only reload if there was a previous SW (i.e. this is an update, not first install)
            if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
              window.location.reload();
            }
          });
        });
      });
    }
